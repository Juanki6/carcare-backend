# ============================================================
# CONFIGURACION PARA ENTORNO DE DESARROLLO (dev)
# ============================================================

# Datos de conexion con la base de datos MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3307/carcare
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=12345

# Configuracion de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Configuracion de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logging para depuracion
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.carcare=DEBUG

# Spring Security: desactivar el usuario por defecto (ahora se usa BD)
spring.security.user.name=
spring.security.user.password=

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

server.address=0.0.0.0